<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Workspace</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebar-title">Chats</h3>
            <span onclick="toggleSidebar()">×</span>
        </div>

        <!-- View: Chats -->
        <div id="view-chats" class="sidebar-view">
            <div id="session-list" class="session-list"></div>
        </div>

        <!-- View: Settings -->
        <div id="view-settings" class="sidebar-view" style="display:none;">
            <div class="config-section">
                <label class="config-label">Provider</label>
                <div class="custom-dropdown" id="provider-dropdown">
                    <div class="dropdown-selected" data-value="openai" onclick="toggleProviderDropdown()">
                        <span class="selected-text">OpenAI</span>
                    </div>
                    <div class="dropdown-options">
                        <div class="dropdown-option selected" data-value="openai" onclick="selectProvider('openai', 'OpenAI')">OpenAI</div>
                        <div class="dropdown-option" data-value="anthropic" onclick="selectProvider('anthropic', 'Anthropic')">Anthropic</div>
                        <div class="dropdown-option" data-value="gemini" onclick="selectProvider('gemini', 'Gemini')">Gemini</div>
                        <div class="dropdown-option" data-value="grok" onclick="selectProvider('grok', 'Grok (xAI)')">Grok (xAI)</div>
                        <div class="dropdown-option" data-value="groq" onclick="selectProvider('groq', 'Groq')">Groq</div>
                        <div class="dropdown-option" data-value="openrouter" onclick="selectProvider('openrouter', 'OpenRouter')">OpenRouter</div>
                        <div class="dropdown-option" data-value="perplexity" onclick="selectProvider('perplexity', 'Perplexity')">Perplexity</div>
                        <div class="dropdown-option" data-value="ollama" onclick="selectProvider('ollama', 'Ollama (Local)')">Ollama (Local)</div>
                        <div class="dropdown-option" data-value="local" onclick="selectProvider('local', 'Local / LM Studio')">Local / LM Studio</div>
                    </div>
                </div>
                <input type="hidden" id="provider-select" value="openai">

                <label class="config-label">Model ID (Optional)</label>
                <input type="text" id="model-input" class="config-input" placeholder="e.g. gpt-4o" onchange="updateModel()">

                <label class="config-label" id="api-key-label">API Key</label>
                <input type="password" id="api-key" class="config-input" placeholder="sk-...">

                <div id="local-url-section" style="display:none">
                    <label class="config-label" id="base-url-label">Server URL</label>
                    <input type="text" id="base-url-input" class="config-input" placeholder="http://localhost:11434">
                </div>

                <button class="btn-save" onclick="saveKey()">Save Configuration</button>
            </div>

            <hr class="divider">

            <!-- Group Context -->
            <h4 style="margin:0 0 12px 0; font-size:0.9rem; font-weight:600">Group Context</h4>
            <div class="config-section">
                <label class="config-label">Active Group</label>
                <select id="group-select" class="config-input" onchange="selectGroup(this.value)" style="cursor:pointer">
                    <option value="1">Default</option>
                </select>
                <label class="config-label">System Prompt</label>
                <textarea id="group-prompt" class="config-input" rows="3" placeholder="Group system prompt..." style="resize:vertical"></textarea>
                <div style="display:flex;gap:8px;margin-top:8px">
                    <button class="btn-save" style="flex:1" onclick="saveGroup()">Save Group</button>
                    <button class="btn-save" style="flex:1;background:rgba(108,92,231,0.4)" onclick="newGroup()">+ New</button>
                </div>
            </div>

            <hr class="divider">

            <!-- Scheduled Tasks -->
            <h4 style="margin:0 0 12px 0; font-size:0.9rem; font-weight:600">Scheduled Tasks</h4>
            <div class="config-section">
                <label class="config-label">Task Name</label>
                <input type="text" id="task-name" class="config-input" placeholder="Daily summary...">
                <label class="config-label">Prompt</label>
                <textarea id="task-prompt" class="config-input" rows="2" placeholder="Summarise today's news..." style="resize:vertical"></textarea>
                <label class="config-label">Interval (seconds)</label>
                <input type="number" id="task-interval" class="config-input" value="3600" min="60">
                <button class="btn-save" onclick="addTask()">Add Task</button>
                <div id="task-list" style="margin-top:12px"></div>
            </div>

            <hr class="divider">

            <!-- Knowledge Base -->
            <h4 style="margin:0 0 12px 0; font-size:0.9rem; font-weight:600">Knowledge Base</h4>
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                Drag PDF/CSV here<br>or Click to upload
            </div>
            <input type="file" id="file-input" multiple style="display:none" onchange="handleFileSelect(event)">
            <div id="sidebar-file-list" style="margin-top:12px"></div>

            <button class="btn-clear" onclick="clearRag()">Clear Context</button>
        </div>
    </div>

    <!-- Sidebar Toggles -->
    <div class="sidebar-toggle-group">
        <div class="sidebar-toggle-tab" onclick="toggleSidebar('chats')" id="tab-chats" title="Chats">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
        <div class="sidebar-toggle-tab" onclick="toggleSidebar('settings')" id="tab-settings" title="Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="header">
            <div class="logo">Agentic Workspace</div>
            <div class="header-controls">
                <button class="new-chat-btn" onclick="newChat()" title="Start a new conversation">+ New Chat</button>
                <span id="group-badge" class="group-badge">Default</span>
                <span>Team Mode:</span>
                <input type="checkbox" id="agent-toggle" onchange="toggleAgents()">
            </div>
        </div>

        <div id="chat-history"></div>

        <div class="input-container">
            <div id="file-list"></div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Ask your agent..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendPrompt()">↑</button>
            </div>
        </div>
    </div>

    <!-- Checkpoint Sidebar (Right) -->
    <div id="checkpoint-sidebar">
        <div class="checkpoint-blocks" id="checkpoint-blocks"></div>
    </div>

    <!-- Scripts -->
    <script src="anime.min.js"></script>
    <script src="marked.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
